services:
  facturador-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: facturador-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      INVOICE_MCP_SERVER_PORT: ${INVOICE_MCP_SERVER_PORT:-9000}
      INVOICE_HTTP_SERVER_PORT: ${INVOICE_HTTP_SERVER_PORT:-8876}
      INVOICE_SERVER_HOST: ${INVOICE_SERVER_HOST:-http://localhost}
    ports:
      - "${INVOICE_MCP_SERVER_PORT:-9000}:${INVOICE_MCP_SERVER_PORT:-9000}"
      - "${INVOICE_HTTP_SERVER_PORT:-8876}:${INVOICE_HTTP_SERVER_PORT:-8876}"
    volumes:
      - ./invoices:/app/invoices
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const net=require('node:net');const port=Number(process.env.INVOICE_MCP_SERVER_PORT||9000);const s=net.connect({host:'127.0.0.1',port},()=>{s.end();process.exit(0);});s.on('error',()=>process.exit(1));setTimeout(()=>{process.exit(1)},2000);\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
